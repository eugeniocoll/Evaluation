<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>IC32 Quiz</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>IC32 Quiz</h1>
    <p>Selecciona dificultad y empieza el test.</p>
  </header>

  <main>
    <section id="config">
      <label for="difficulty">Dificultad:</label>
      <select id="difficulty">
        <option value="normal">Normal</option>
        <option value="mixed">Mixed</option>
        <option value="hard">Hard</option>
        <option value="standard_exam">Examen Standard</option>
        <option value="hard_exam">Examen Hard</option>
        <option value="last">Last Quiz (últimas 30 preguntas)</option>
      </select>

      <label for="numQuestions">Número de preguntas:</label>
      <input id="numQuestions" type="number" min="1" max="120" value="20" />

      <button id="startBtn">Empezar</button>
    </section>

    <section id="quiz" class="hidden">
      <div id="progress"></div>
      <h2 id="questionText"></h2>
      <ul id="answersList"></ul>

      <!-- Feedback IC32 -->
      <div id="feedback" class="hidden"></div>

      <!-- Botón de búsqueda online -->
      <button id="searchBtn">Buscar explicación en internet</button>

      <button id="nextBtn" disabled>Siguiente</button>
    </section>

    <section id="result" class="hidden">
      <h2>Resultado</h2>
      <p id="scoreText"></p>
      <button id="restartBtn">Volver a empezar</button>
    </section>
  </main>

  <footer>
    <p>IC32 Practice Quiz · GitHub Pages</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
